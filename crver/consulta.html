<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>RCVER | Consulta Vehicular</title>

<meta name="description" content="Consulta de vehículos sustraídos RCVER">

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>

<link rel="stylesheet" href="css/style.css"/>

</head>

<body class="bg-dark text-white">

<div class="container py-5">

    <h1 class="text-center titulo-logo mb-2">RCVER</h1>
    <h4 class="text-center mb-4">Consulta Vehicular</h4>

    <div class="card p-4 mx-auto shadow" style="max-width:500px; border-radius:12px;">

        <input
            type="text"
            id="busqueda"
            class="form-control mb-3 text-center"
            placeholder="Patente / Motor / Chasis"
        >

        <button id="btnBuscar" class="btn btn-primary w-100 mb-3">
            Buscar
        </button>

        <div id="resultado" class="mt-4 text-center fw-bold"></div>

        <!-- INFORMES -->
        <div class="mt-4 text-center d-grid gap-2">

            <a href="https://www.datacar.com.ar/"
               target="_blank"
               class="btn btn-warning">
               Informe Automotor (Datacar)
            </a>

            <a href="https://informes.nosis.com/"
               target="_blank"
               class="btn btn-info">
               Informe Nominal (Nosis)
            </a>

        </div>

        <div class="mt-4 text-center">
            <button id="btnCerrar" class="btn btn-secondary w-100">
                Cerrar Sesión
            </button>
        </div>

    </div>
</div>

<script src="js/app.js"></script>

</body>
</html>
