<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>RCVER | Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link rel="stylesheet" href="css/style.css"/>

</head>

<body class="bg-dark d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 shadow-lg login-card" style="width:350px;">

    <h2 class="text-center mb-2 titulo-logo">RCVER</h2>
    <p class="text-center text-muted mb-4">Sistema de Consulta Vehicular</p>

    <input type="text" id="user" class="form-control mb-3" placeholder="Usuario">
    <input type="password" id="pass" class="form-control mb-3" placeholder="Clave">

    <!-- BOTON LOGIN -->
    <button onclick="loginRCVER()" class="btn btn-primary w-100 mb-3">
        Ingresar
    </button>

    <p id="mensaje" class="text-center fw-bold"></p>

</div>

<script src="js/login.js"></script>

</body>
</html>
